<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitBuddy - AI Fitness Plan</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <!-- Load gorgeous modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
   <a href="https://github.com/amar2004-ak/fitbuddy-ai" target="_blank"
   style="position:fixed; top:20px; right:20px;
          display:flex; align-items:center;
          text-decoration:none; color:white;
          background:#000; padding:6px 12px;
          border-radius:6px; font-family:Arial;">

  <!-- Official GitHub Octocat SVG -->
  <svg height="20" width="20" viewBox="0 0 16 16"
       fill="white" style="margin-right:6px;">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47
    7.59.4.07.55-.17.55-.38
    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94
    -.09-.23-.48-.94-.82-1.13
    -.28-.15-.68-.52-.01-.53
    .63-.01 1.08.58 1.23.82
    .72 1.21 1.87.87 2.33.66
    .07-.52.28-.87.51-1.07
    -1.78-.2-3.64-.89-3.64-3.95
    0-.87.31-1.59.82-2.15
    -.08-.2-.36-1.02.08-2.12
    0 0 .67-.21 2.2.82
    a7.65 7.65 0 0 1 2-.27
    c.68 0 1.36.09 2 .27

  GitHub
</a>

<style>
.github-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background-color:#000;
    color: white;
    padding: 8px 14px;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 500;
    font-family: Arial, sans-serif;
    transition: 0.3s ease;
    z-index: 1000;
}
.github-btn:hover {
    background-color:#333;
    transform: scale(1.05);
}
</style>
    <div class="glow-container"></div>
    <main class="glass-card main-container">
        <header>
            <h1 class="gradient-text">FitBuddy</h1>
            <p class="subtitle">Your AI-Powered Personal Trainer</p>
        </header>
        
        <form action="/generate" method="post" class="fitness-form">
            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="e.g. 25" required min="10" max="100">
            </div>

            <div class="input-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" step="0.1" id="weight" name="weight" placeholder="e.g. 70" required min="20" max="300">
            </div>

            <div class="input-group">
                <label for="height">Height (cm)</label>
                <input type="number" step="0.1" id="height" name="height" placeholder="e.g. 175" required min="50" max="250">
            </div>

            <div class="input-group">
                <label for="goal">Primary Goal</label>
                <select id="goal" name="goal" required>
                    <option value="" disabled selected>Select your objective...</option>
                    <option value="Weight Loss">Weight Loss / Fat Burning</option>
                    <option value="Muscle Gain">Muscle Gain / Hypertrophy</option>
                    <option value="Endurance">Endurance & Stamina</option>
                    <option value="General Fitness">General Health & Fitness</option>
                    <option value="Flexibility">Flexibility & Mobility</option>
                </select>
            </div>

            <div class="input-group">
                <label for="activity_level">Current Activity Level</label>
                <select id="activity_level" name="activity_level" required>
                    <option value="" disabled selected>Select activity level...</option>
                    <option value="Sedentary">Sedentary (little to no exercise)</option>
                    <option value="Lightly Active">Lightly Active (exercise 1-3 days/week)</option>
                    <option value="Moderately Active">Moderately Active (exercise 3-5 days/week)</option>
                    <option value="Very Active">Very Active (exercise 6-7 days/week)</option>
                    <option value="Super Active">Super Active (intense training)</option>
                </select>
            </div>

            <button type="submit" class="generate-btn">
                <span>Generate Smart Plan</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </form>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <h2 class="gradient-text">Analyzing your profile...</h2>
        <p>Crafting your perfect fitness journey</p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function() {
            document.getElementById('loading').style.display = 'flex';
        });
    </script>
</body>
</html>
